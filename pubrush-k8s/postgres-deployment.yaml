apiVersion: apps/v1
kind: Deployment
metadata:
  name: pubrush-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pubrush-db
  template:
    metadata:
      labels:
        app: pubrush-db
    spec:
      containers:
      - name: postgres
        image: postgres:15-alpine
        env:
        - name: POSTGRES_USER
          valueFrom:
            configMapKeyRef:
              name: pubrush-config
              key: DB_USER
        - name: POSTGRES_DB
          valueFrom:
            configMapKeyRef:
              name: pubrush-config
              key: DB_NAME
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: pubrush-secrets
              key: DB_PASSWORD
        ports:
        - containerPort: 5432
        readinessProbe:
          exec:
            command: ["sh", "-c", "pg_isready -U pubrush -d pubrush"]
          initialDelaySeconds: 5
          periodSeconds: 5
        volumeMounts:
        - mountPath: /var/lib/postgresql/data
          name: db-storage
      volumes:
      - name: db-storage
        persistentVolumeClaim:
          claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: db # <-- C'est ce nom qui sera résolu par le backend
spec:
  selector:
    app: pubrush-db # Oriente le trafic vers le pod de la BDD
  ports:
    - protocol: TCP
      port: 5432
      targetPort: 5432
