name: CI/CD Pubrush Backend

on:
  push:
    branches:
      - main

jobs:
  # --- PHASE 0 : RUN AUTOMATED TESTS ---
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Installer les dépendances
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Exécuter les tests avec pytest
        env:
          DATABASE_URL: 'sqlite:///:memory:'
        run: |
          cd backend
          python -m pytest -v

  # --- PHASE 1 : BUILD & PUSH (S'exécute uniquement si les tests passent) ---
  build-and-push:
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: baptistebriziou/pubrush-backend:latest

  # --- PHASE 2 : DEPLOIEMENT SECURISE VIA TUNNEL SSH ---
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer la clé SSH locale
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Ajoute le VPS aux hôtes connus pour éviter le blocage "untrusted host"
          ssh-keyscan -p 22 ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Ouvrir le tunnel SSH et lancer le Déploiement
        run: |
          # 1. Ouverture du tunnel
          ssh -f -N -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -L 6443:127.0.0.1:6443 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} -i ~/.ssh/id_ed25519
          
          # 2. Installation de kubectl
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          
          # 3. Décodage du kubeconfig
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 --decode > ~/.kube/config
          
          # LIGNE MAGIQUE CORRIGÉE : On force kubectl à utiliser le tunnel (localhost) au lieu de l'IP publique !
          kubectl config set-cluster default --server=https://127.0.0.1:6443 --insecure-skip-tls-verify=true
          
          # 4. Test de connexion réseau interne (Passera à travers le tunnel)
          kubectl cluster-info
          
          # 5. Forcer le redémarrage du backend
          kubectl rollout restart deployment/pubrush-backend

  # --- PHASE 3 : DEPLOIEMENT EXPO / EAS UPDATE (MOBILE) ---
  deploy-mobile:
    runs-on: ubuntu-latest
    needs: run-tests
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Configurer EAS / Expo CLI
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Installer les dépendances
        run: |
          cd mobile
          npm ci

      - name: Publier la mise à jour EAS Update
        run: |
          cd mobile
          npx eas update --branch preview --message "Mise à jour automatique - Build #${{ github.run_number }}" --platform all --non-interactive

