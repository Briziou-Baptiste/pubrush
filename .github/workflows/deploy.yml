name: CI/CD Pubrush Backend

on:
  push:
    branches:
      - main

jobs:
  # --- PHASE 1 : BUILD & PUSH (Inchangée) ---
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Connexion à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build et Push de l'image Docker
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: baptistebriziou/pubrush-backend:latest

  # --- PHASE 2 : DEPLOIEMENT SECURISE VIA TUNNEL SSH ---
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configurer la clé SSH locale
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          # Ajoute le VPS aux hôtes connus pour éviter le blocage "untrusted host"
          ssh-keyscan -p 22 ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Ouvrir le tunnel SSH et lancer le Déploiement
        run: |
          # Crée le tunnel en arrière-plan (-f -N). 
          # Il écoute sur le port 6443 de GitHub et transfert vers le 6443 du VPS
          ssh -f -N -L 6443:127.0.0.1:6443 ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} -i ~/.ssh/id_ed25519
          
          # Installer kubectl sur le runner GitHub
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/
          
          # Décoder le kubeconfig et l'appliquer
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_DATA }}" | base64 -d > ~/.kube/config
          
          # Forcer le redémarrage du backend à travers le tunnel
          kubectl rollout restart deployment/pubrush-backend
